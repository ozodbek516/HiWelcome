server:
  port: 8088

spring:
  application:
    name: HiWelcome

  mail:
    host: smtp.gmail.com
    port: 587
    username: xturgunov069@gmail.com
    password: ${DB_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:postgresql://localhost:5432/hw_auth_db
    username: postgres
    password: root123
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HwAuthHikariPool

  jpa:
    database: postgresql
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: true
        session:
          events:
